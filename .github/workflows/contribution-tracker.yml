name: Contribution Tracker

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  track-contributions:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.repository, 'Template') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests PyGithub matplotlib pandas tabulate

      - name: Generate contribution report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/generate_contribution_report.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📊 docs: atualizar relatório de contribuições"
          branch: "docs/contribution-report-update"
          delete-branch: true
          title: "Relatório de Contribuições - Atualização"
          body: |
            ## 📊 Relatório de Contribuições Atualizado
            Este PR foi gerado automaticamente pelo workflow **Contribution Tracker**.
            Ele contém as últimas métricas de commits, imagens de gráficos e tabelas de participação.
          base: main
